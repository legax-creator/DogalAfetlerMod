name: Minecraft Mod CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Java 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Eksik Gradle Wrapper Dosyalarını Otomatik Yükle
      run: |
        mkdir -p gradle/wrapper
        wget https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar

    - name: Gradle Önbelleğini Ayarla
      uses: gradle/actions/setup-gradle@v3

    - name: Gradle Komutunu Çalıştırılabilir Yap
      run: chmod +x gradlew

    - name: Modu Derle (Build)
      run: ./gradlew build
      
